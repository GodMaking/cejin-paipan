<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>VIP 审核后台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: -apple-system, sans-serif; padding: 20px; background: #f5f5f5; }
.box { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; }
h3 { margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
th { background: #f8f8f8; font-weight: 600; }
.btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-right: 6px; }
.btn-pass { background: #07c160; color: white; }
.btn-reject { background: #999; color: white; }
.login-box { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; text-align: center; }
input[type="password"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h3>管理员验证</h3>
  <input type="password" id="pwd" placeholder="输入后台密码" onkeypress="if(event.key==='Enter')checkAdmin()">
  <button onclick="checkAdmin()" style="width:100%;padding:12px;background:#333;color:white;border:none;border-radius:6px;cursor:pointer;">进入后台</button>
</div>

<div class="box hidden" id="adminPanel">
  <h3>待审核 VIP 申请</h3>
  <table>
    <thead>
      <tr><th>时间</th><th>邮箱账号</th><th>付款凭证</th><th>联系方式</th><th>操作</th></tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

<script>
// ===================== 改成你的 =====================
const SUPABASE_URL = '【改成你的Supabase URL】'
// ⚠️ 警告：这是 Service Role Key，具有最高权限，严禁泄露给任何人！
const SUPABASE_SERVICE_KEY = '【改成你的Supabase service_role secret key】'
const ADMIN_PWD = '【你自己设一个后台密码，比如 CeJin2026!Admin】'
// ===================================================

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY)

function checkAdmin() {
  if (document.getElementById('pwd').value === ADMIN_PWD) {
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    loadList();
  } else {
    alert('密码错误');
  }
}

async function loadList() {
  const { data, error } = await supabase
    .from('vip_applications')
    .select('*')
    .eq('status', 'pending')
    .order('created_at', { ascending: false });
    
  if (error) return alert('加载失败：' + error.message);
  
  const tbody = document.getElementById('list');
  tbody.innerHTML = '';
  
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;padding:30px;">暂无待审核</td></tr>';
    return;
  }
  
  data.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${new Date(item.created_at).toLocaleString()}</td>
      <td><strong>${item.account}</strong></td>
      <td>${item.proof}</td>
      <td>${item.contact || '-'}</td>
      <td>
        <button class="btn btn-pass" onclick="approve('${item.account}', ${item.id})">通过</button>
        <button class="btn btn-reject" onclick="reject(${item.id})">拒绝</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

async function approve(account, id) {
  // 1. 找到用户（匹配邮箱）
  const { data: { users }, error: listErr } = await supabase.auth.admin.listUsers();
  if (listErr) return alert('获取用户列表失败');
  
  const target = users.find(u => u.email === account);
  
  if (!target) {
    alert('未找到该用户，请确认邮箱拼写是否正确'); 
    return;
  }
  
  // 2. 更新为 VIP
  const { error: updErr } = await supabase.auth.admin.updateUserById(target.id, {
    user_metadata: { ...target.user_metadata, membership: 'vip' }
  });
  
  if (updErr) return alert('开通失败：' + updErr.message);
  
  // 3. 标记申请通过
  await supabase.from('vip_applications').update({ status: 'approved' }).eq('id', id);
  
  alert('已开通 VIP');
  loadList();
}

async function reject(id) {
  await supabase.from('vip_applications').update({ status: 'rejected' }).eq('id', id);
  loadList();
}
</script>
</body>
</html>
