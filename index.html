<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>策今排盘 - 登录</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 420px; }
h2 { text-align: center; margin-bottom: 6px; color: #333; }
.sub { text-align: center; color: #999; font-size: 13px; margin-bottom: 25px; }
.form-group { margin-bottom: 18px; }
label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
input:focus { outline: none; border-color: #4a90e2; }
.btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
.btn-blue { background: #4a90e2; color: white; }
.btn-blue:hover { background: #357abd; }
.btn-green { background: #07c160; color: white; }
.btn-green:hover { background: #06ad56; }
.btn-gray { background: #f0f0f0; color: #555; }
.error { color: #e74c3c; font-size: 13px; margin-top: 8px; display: none; text-align: center; }
.hidden { display: none; }
.user-info { line-height: 2; color: #555; font-size: 15px; }
.badge { display: inline-block; background: #ffd700; color: #8b6914; padding: 2px 10px; border-radius: 4px; font-size: 12px; margin-left: 8px; }
</style>
</head>
<body>

<div class="box">
  <h2>策今 AI 排盘</h2>
  <p class="sub">独立第三方命理工具</p>

  <div id="loginForm">
    <div class="form-group">
      <label>邮箱（作为账号）</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="至少6位">
    </div>
    <button class="btn btn-blue" onclick="emailLogin()">登录 / 注册</button>
    <div class="error" id="errorMsg"></div>
    <p style="text-align:center;color:#999;font-size:13px;margin-top:12px;">新用户直接输入邮箱密码即可自动注册</p>
  </div>

  <div id="userPanel" class="hidden">
    <div class="user-info">
      <p>账号：<span id="uName"></span></p>
      <p>等级：<span id="uTier">免费用户</span><span class="badge" id="vipBadge" style="display:none">VIP</span></p>
      <p>排盘次数：<span id="uCount">0</span></p>
    </div>
    <button class="btn btn-green" onclick="location.href='vip.html'" style="margin-top:18px;">升级 VIP</button>
    <button class="btn btn-gray" onclick="logout()" style="margin-top:10px;">退出登录</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://cejin-api.tian5116495.workers.dev'
const SUPABASE_KEY = 'sb_publishable_cF7YA5UQdX-mDpAY8VPCzQ_J-mBp3ww'

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function init() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (user) showUser(user);
}

function showUser(user) {
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('userPanel').classList.remove('hidden');
  const meta = user.user_metadata || {};
  document.getElementById('uName').textContent = meta.username || user.email;
  document.getElementById('uTier').textContent = meta.membership === 'vip' ? 'VIP会员' : '免费用户';
  document.getElementById('vipBadge').style.display = meta.membership === 'vip' ? 'inline-block' : 'none';
  document.getElementById('uCount').textContent = meta.usage_count || 0;
}

async function emailLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errBox = document.getElementById('errorMsg');
  
  if (!email || password.length < 6) {
    errBox.textContent = '请输入邮箱和密码（至少6位）'; 
    errBox.style.display = 'block'; 
    return;
  }
  
  let { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  
  if (error) {
    const { data: regData, error: regErr } = await supabaseClient.auth.signUp({
      email, password,
      options: { 
        data: { 
          username: email.split('@')[0], 
          membership: 'free', 
          usage_count: 0 
        } 
      }
    });
    if (regErr) { 
      errBox.textContent = regErr.message; 
      errBox.style.display = 'block'; 
      return; 
    }
    alert('注册成功，已自动登录');
    data = regData;
  }
  showUser(data.user);
}

async function logout() {
  await supabaseClient.auth.signOut();
  document.getElementById('loginForm').classList.remove('hidden');
  document.getElementById('userPanel').classList.add('hidden');
  document.getElementById('email').value = '';
  document.getElementById('password').value = '';
}

init();
</script>
</body>
</html>
